name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm --prefix frontend install

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Build Go binary
        run: go build -o /dev/null ./cmd/cternal/

      - name: Run Go tests
        run: go test -race -coverprofile=coverage.out $(go list ./... | grep -v /frontend/)

      - name: Run frontend tests
        run: npm --prefix frontend run test

      - name: Go coverage summary
        run: go tool cover -func=coverage.out | tail -1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm --prefix frontend install

      - name: Build frontend (required for go:embed)
        run: npm --prefix frontend run build

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Frontend lint
        run: npm --prefix frontend run lint

      - name: Frontend type check
        run: npm --prefix frontend run type-check
