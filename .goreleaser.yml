version: 2

project_name: cternal

before:
  hooks:
    - pnpm --dir frontend install --frozen-lockfile
    - pnpm --dir frontend run build

builds:
  - id: cternal
    main: ./cmd/cternal/
    binary: cternal
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{ .Version }}
      - -X main.Commit={{ .Commit }}
      - -X main.BuildDate={{ .Date }}

archives:
  - id: cternal
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files: []  # binary only; no LICENSE/README in this repo yet

checksum:
  name_template: "checksums.txt"

dockers_v2:
  - id: cternal
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
    images:
      - ghcr.io/wtnb75/cternal
    tags:
      - "{{ .Version }}"
      - latest

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
